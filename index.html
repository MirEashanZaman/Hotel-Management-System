<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Management System — Login</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --dark2: #161616;
      --dark3: #1e1e1e;
      --border: rgba(201, 168, 76, 0.25);
      --text: #e8e0d0;
      --text-muted: #7a7060;
      --error: #e05a5a;
    }

    html,
    body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 60%);
    }

    .bg-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      animation: fadeIn 0.6s ease;
    }

    .hotel-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .hotel-emblem {
      width: 60px;
      height: 60px;
      border: 1px solid var(--gold);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transform: rotate(45deg);
    }

    .hotel-emblem span {
      font-size: 24px;
      color: var(--gold);
      transform: rotate(-45deg);
      display: block;
      line-height: 1;
    }

    .hotel-brand h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text);
    }

    .hotel-brand p {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }

    .login-card {
      background: var(--dark2);
      border: 1px solid var(--border);
      padding: 36px;
      position: relative;
    }

    .login-card::before,
    .login-card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold);
      border-style: solid;
    }

    .login-card::before {
      top: -1px;
      left: -1px;
      border-width: 1px 0 0 1px;
    }

    .login-card::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 1px 1px 0;
    }

    .login-card h2 {
      font-size: 19px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-card .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 26px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--gold);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 12px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
      z-index: -1;
    }

    .btn-login:hover {
      color: var(--dark);
    }

    .btn-login:hover::before {
      transform: scaleX(1);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-signup {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 12px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .btn-signup:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .error-msg {
      background: rgba(224, 90, 90, 0.1);
      border: 1px solid rgba(224, 90, 90, 0.3);
      color: var(--error);
      padding: 10px 14px;
      font-size: 12px;
      margin-top: 14px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="bg-pattern"></div>
  <div class="bg-lines"></div>
  <div class="login-wrap">
    <div class="hotel-brand">
      <div class="hotel-emblem"><span>H</span></div>
      <h1>Hotel Management</h1>
      <p>System</p>
    </div>
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter Your Email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Your Password" autocomplete="current-password">
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
      <button class="btn-signup" onclick="window.location.href='register.html'">New Customer? Sign Up</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
  <script>
    fetch('api/session.php').then(r => r.json()).then(d => {
      if (d.loggedIn) window.location.href = 'dashboard.html';
    });
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      err.classList.remove('show');
      if (!email || !password) {
        err.textContent = 'Please enter email and password.';
        err.classList.add('show'); return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Signing In...';
      try {
        const res = await fetch('api/login.php', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = 'dashboard.html';
        } else {
          err.textContent = data.error || 'Login failed.';
          err.classList.add('show');
          btn.disabled = false; btn.innerHTML = 'Sign In';
        }
      } catch {
        err.textContent = 'Server error. Please try again.';
        err.classList.add('show');
        btn.disabled = false; btn.innerHTML = 'Sign In';
      }
    }
  </script>
</body>

</html>
