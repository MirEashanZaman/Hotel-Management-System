<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Payment — Hotel Management System</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --dark2: #111111;
      --dark3: #161616;
      --dark4: #1c1c1c;
      --border: rgba(201, 168, 76, 0.2);
      --text: #e8e0d0;
      --text2: #b0a898;
      --text-muted: #5a5248;
      --green: #4cc97a;
      --red: #e05a5a;
    }

    html,
    body {
      min-height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: radial-gradient(ellipse 80% 60% at 30% 30%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
    }

    .wrap {
      width: 100%;
      max-width: 480px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .back-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .page-header h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .page-header p {
      font-size: 11px;
      color: var(--text-muted);
    }

    .summary {
      background: var(--dark3);
      border: 1px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 13px;
      color: var(--text2);
    }

    .summary-amount {
      font-size: 26px;
      color: var(--gold);
      font-weight: 500;
    }

    .card-visual {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      height: 190px;
    }

    .card-visual::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.06);
    }

    .card-visual::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -20px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.04);
    }

    .card-chip {
      width: 42px;
      height: 32px;
      background: linear-gradient(135deg, #c9a84c, #e8c97a);
      border-radius: 5px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .card-chip::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 20px;
      border: 1px solid rgba(0, 0, 0, 0.3);
      border-radius: 3px;
    }

    .card-number-display {
      font-size: 17px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      font-family: 'Courier New', monospace;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-bottom-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 3px;
    }

    .card-bottom-value {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 1px;
    }

    .card-logo {
      font-size: 22px;
      opacity: 0.8;
    }

    .card-form {
      background: var(--dark3);
      border: 1px solid var(--border);
      padding: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--dark4);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }

    .form-group input:focus {
      border-color: var(--gold);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      letter-spacing: 0;
      font-size: 12px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .secure-note {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .secure-note span {
      color: var(--green);
      font-size: 14px;
    }

    .btn-pay {
      width: 100%;
      background: var(--gold);
      border: none;
      color: #0d0d0d;
      padding: 14px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-pay:hover {
      background: #e8c97a;
    }

    .btn-pay:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .processing {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .processing.show {
      display: block;
    }

    .card-form.hide {
      display: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    .processing h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .processing p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .success-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
      background: var(--dark3);
      border: 1px solid var(--border);
    }

    .success-screen.show {
      display: block;
    }

    .success-icon {
      width: 70px;
      height: 70px;
      background: rgba(76, 201, 122, 0.1);
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      animation: popIn 0.4s ease;
    }

    .success-screen h3 {
      font-size: 20px;
      color: var(--green);
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .success-amount {
      font-size: 28px;
      color: var(--gold);
      margin: 12px 0;
    }

    .btn-done {
      display: inline-block;
      margin-top: 20px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px 28px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-done:hover {
      background: var(--green);
      color: #0d0d0d;
    }

    .error-msg {
      background: rgba(224, 90, 90, 0.08);
      border: 1px solid rgba(224, 90, 90, 0.3);
      color: var(--red);
      padding: 11px 14px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      70% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="page-header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div>
        <h1>Card Payment</h1>
        <p>Secure payment gateway</p>
      </div>
    </div>

    <div class="summary" id="summaryBox">
      <div>
        <div class="summary-label">Booking</div>
        <div class="summary-value" id="summaryBooking">—</div>
        <div class="summary-value" id="summaryRoom" style="margin-top:3px;font-size:12px;color:var(--text-muted)">—
        </div>
      </div>
      <div style="text-align:right;">
        <div class="summary-label">Total Amount</div>
        <div class="summary-amount" id="summaryAmount">৳0</div>
      </div>
    </div>

    <div class="card-visual" id="cardVisual">
      <div class="card-chip"></div>
      <div class="card-number-display" id="displayNumber">•••• •••• •••• ••••</div>
      <div class="card-bottom">
        <div>
          <div class="card-bottom-label">Card Holder</div>
          <div class="card-bottom-value" id="displayName">YOUR NAME</div>
        </div>
        <div>
          <div class="card-bottom-label">Expires</div>
          <div class="card-bottom-value" id="displayExpiry">MM/YY</div>
        </div>
        <div class="card-logo">💳</div>
      </div>
    </div>

    <div class="card-form" id="cardForm">
      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Card Number</label>
        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19"
          oninput="formatCardNumber(this)" autocomplete="cc-number">
      </div>

      <div class="form-group">
        <label>Card Holder Name</label>
        <input type="text" id="cardName" placeholder="Name on card" oninput="updateDisplay()" autocomplete="cc-name">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)"
            autocomplete="cc-exp">
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="password" id="cardCvv" placeholder="•••" maxlength="4" autocomplete="cc-csc">
        </div>
      </div>

      <div class="secure-note">
        <span>🔒</span> Your payment is secured with 256-bit SSL encryption
      </div>

      <button class="btn-pay" id="payBtn" onclick="processPayment()">
        Pay <span id="btnAmount">৳0</span>
      </button>
    </div>

    <div class="processing" id="processing">
      <div class="spinner"></div>
      <h3>Processing Payment...</h3>
      <p>Please do not close this window</p>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="success-icon">✓</div>
      <h3>Payment Successful!</h3>
      <div class="success-amount" id="successAmount">৳0</div>
      <p>Your booking has been <strong style="color:var(--green)">confirmed</strong>.</p>
      <p id="successBooking" style="margin-top:6px;"></p>
      <button class="btn-done" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get('booking_id');
    const amount = parseFloat(params.get('amount') || 0);
    const roomNum = params.get('room') || '—';
    const checkIn = params.get('checkin') || '';
    const checkOut = params.get('checkout') || '';

    if (!bookingId || !amount) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('summaryBooking').textContent = `Booking #${bookingId}`;
    document.getElementById('summaryRoom').textContent = `Room ${roomNum} · ${checkIn} → ${checkOut}`;
    document.getElementById('summaryAmount').textContent = `৳${Number(amount).toLocaleString()}`;
    document.getElementById('btnAmount').textContent = `৳${Number(amount).toLocaleString()}`;
    document.getElementById('successAmount').textContent = `৳${Number(amount).toLocaleString()}`;
    document.getElementById('successBooking').textContent = `Booking #${bookingId} · Room ${roomNum}`;

    function goBack() {
      window.location.href = 'dashboard.html';
    }

    function formatCardNumber(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 16);
      input.value = v.replace(/(.{4})/g, '$1 ').trim();
      updateDisplay();
    }

    function formatExpiry(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 4);
      if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2);
      input.value = v;
      updateDisplay();
    }

    function updateDisplay() {
      const num = document.getElementById('cardNumber').value || '•••• •••• •••• ••••';
      const name = document.getElementById('cardName').value || 'YOUR NAME';
      const exp = document.getElementById('cardExpiry').value || 'MM/YY';

      const parts = num.split(' ');
      const masked = parts.map((p, i) => (i === 1 || i === 2) ? '••••' : p).join(' ');
      document.getElementById('displayNumber').textContent = masked || '•••• •••• •••• ••••';
      document.getElementById('displayName').textContent = name.toUpperCase().substring(0, 22);
      document.getElementById('displayExpiry').textContent = exp;
    }

    function validate() {
      const num = document.getElementById('cardNumber').value.replace(/\s/g, '');
      const name = document.getElementById('cardName').value.trim();
      const exp = document.getElementById('cardExpiry').value;
      const cvv = document.getElementById('cardCvv').value;
      const err = document.getElementById('errorMsg');

      err.classList.remove('show');

      if (num.length !== 16) { err.textContent = 'Please enter a valid 16-digit card number.'; err.classList.add('show'); return false; }
      if (!name) { err.textContent = 'Please enter the card holder name.'; err.classList.add('show'); return false; }
      if (!/^\d{2}\/\d{2}$/.test(exp)) { err.textContent = 'Please enter a valid expiry date (MM/YY).'; err.classList.add('show'); return false; }

      const [mm, yy] = exp.split('/').map(Number);
      const now = new Date();
      const expDate = new Date(2000 + yy, mm - 1);
      if (expDate < new Date(now.getFullYear(), now.getMonth())) {
        err.textContent = 'This card has expired.'; err.classList.add('show'); return false;
      }

      if (cvv.length < 3) { err.textContent = 'Please enter a valid CVV.'; err.classList.add('show'); return false; }

      return true;
    }

    async function processPayment() {
      if (!validate()) return;

      const btn = document.getElementById('payBtn');
      btn.disabled = true;

      document.getElementById('cardForm').classList.add('hide');
      document.getElementById('cardVisual').style.display = 'none';
      document.getElementById('summaryBox').style.display = 'none';
      document.getElementById('processing').classList.add('show');

      await new Promise(r => setTimeout(r, 2200));

      try {
        const res = await fetch('api/payments.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            booking_id: parseInt(bookingId),
            amount: amount,
            payment_method: 'card',
            transaction_id: 'CARD-' + Date.now()
          })
        });
        const data = await res.json();

        document.getElementById('processing').classList.remove('show');

        if (data.success) {
          document.getElementById('successScreen').classList.add('show');
        } else {
          document.getElementById('cardForm').classList.remove('hide');
          document.getElementById('cardVisual').style.display = '';
          document.getElementById('summaryBox').style.display = '';
          const err = document.getElementById('errorMsg');
          err.textContent = data.error || 'Payment failed. Please try again.';
          err.classList.add('show');
          btn.disabled = false;
        }
      } catch {
        document.getElementById('processing').classList.remove('show');
        document.getElementById('cardForm').classList.remove('hide');
        document.getElementById('cardVisual').style.display = '';
        document.getElementById('summaryBox').style.display = '';
        const err = document.getElementById('errorMsg');
        err.textContent = 'Connection error. Please try again.';
        err.classList.add('show');
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
