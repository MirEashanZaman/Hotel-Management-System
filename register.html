<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Management System — Register</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --dark2: #161616;
      --dark3: #1e1e1e;
      --border: rgba(201, 168, 76, 0.25);
      --text: #e8e0d0;
      --text-muted: #7a7060;
      --error: #e05a5a;
      --green: #4cc97a;
    }

    html,
    body {
      min-height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 60%);
    }

    .bg-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      animation: fadeIn 0.6s ease;
    }

    .hotel-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .hotel-emblem {
      width: 56px;
      height: 56px;
      border: 1px solid var(--gold);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transform: rotate(45deg);
    }

    .hotel-emblem span {
      font-size: 22px;
      color: var(--gold);
      transform: rotate(-45deg);
      display: block;
      line-height: 1;
    }

    .hotel-brand h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text);
    }

    .hotel-brand p {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }

    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      padding: 36px;
      position: relative;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }

    .card::before {
      top: -1px;
      left: -1px;
      border-width: 1px 0 0 1px;
    }

    .card::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 1px 1px 0;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card .sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-group label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .form-group input {
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus {
      border-color: var(--gold);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .password-hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 13px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
      z-index: -1;
    }

    .btn:hover {
      color: var(--dark);
    }

    .btn:hover::before {
      transform: scaleX(1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .alert {
      padding: 11px 14px;
      font-size: 12px;
      margin-top: 16px;
      border: 1px solid;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      color: var(--error);
      border-color: rgba(224, 90, 90, 0.3);
      background: rgba(224, 90, 90, 0.08);
    }

    .alert-success {
      color: var(--green);
      border-color: rgba(76, 201, 122, 0.3);
      background: rgba(76, 201, 122, 0.08);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .login-link a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid rgba(201, 168, 76, 0.3);
      transition: border-color 0.2s;
    }

    .login-link a:hover {
      border-color: var(--gold);
    }

    .loading-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="bg-pattern"></div>
  <div class="bg-lines"></div>

  <div class="wrap">
    <div class="hotel-brand">
      <div class="hotel-emblem"><span>H</span></div>
      <h1>Hotel Management</h1>
      <p>System</p>
    </div>

    <div class="card">
      <h2>Create Account</h2>
      <p class="sub">Register as a new customer</p>

      <div class="form-grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name">
        </div>
        <div class="form-group full">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="+880...">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" placeholder="City, Country">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 8 characters">
          <span class="password-hint">Minimum 8 characters</span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password">
        </div>
      </div>

      <button class="btn" id="regBtn" onclick="doRegister()">Create Account</button>

      <div class="alert alert-error" id="errMsg"></div>
      <div class="alert alert-success" id="okMsg"></div>
    </div>

    <div class="login-link">Already have an account? <a href="index.html">Sign in</a></div>
  </div>

  <script>
    fetch('api/session.php').then(r => r.json()).then(d => {
      if (d.loggedIn) window.location.href = 'dashboard.html';
    });

    async function doRegister() {
      const btn = document.getElementById('regBtn');
      const err = document.getElementById('errMsg');
      const ok = document.getElementById('okMsg');

      err.classList.remove('show');
      ok.classList.remove('show');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      // Validation
      if (!name || !email || !password || !confirm) {
        err.textContent = 'Name, email and password are required.';
        err.classList.add('show'); return;
      }

      const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailReg.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        err.classList.add('show'); return;
      }

      if (password.length < 8) {
        err.textContent = 'Password must be at least 8 characters.';
        err.classList.add('show'); return;
      }

      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.classList.add('show'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Creating Account...';

      try {
        const res = await fetch('api/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, address, password })
        });
        const data = await res.json();

        if (data.success) {
          ok.textContent = 'Account created! Redirecting to login...';
          ok.classList.add('show');
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          err.textContent = data.error || 'Registration failed.';
          err.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
        }
      } catch {
        err.textContent = 'Server error. Please try again.';
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }
  </script>
</body>

</html>
